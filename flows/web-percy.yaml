# Comprehensive Percy + Maestro demo flow (with .percy.yml for shared defaults).
#
# Widths (375, 1280) and minHeight (1024) come from .percy.yml — no need to
# repeat them per snapshot. Only per-snapshot overrides appear here.

url: https://percy.io
---
- launchApp

# =============================================================================
# Test Case 1 — Homepage smoke (defaults from .percy.yml)
# =============================================================================

- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "homepage-hero"
      TEST_CASE: "homepage-smoke"
      LABELS: "smoke,critical-path,hero"
      PERCY_CSS: "h1, h2 { color: #ec4899 !important; background: #fef3c7 !important; padding: 16px !important; border: 3px solid #3b82f6 !important; }"

- scroll
- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "homepage-features-section"
      TEST_CASE: "homepage-smoke"
      LABELS: "smoke,features"
      PERCY_CSS: "h1, h2, h3 { color: #ec4899 !important; background: #fef3c7 !important; } section { outline: 2px dashed #14b8a6 !important; }"

- scroll
- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "homepage-footer-area"
      TEST_CASE: "homepage-smoke"
      LABELS: "smoke,footer"
      PERCY_CSS: "footer { background: #fca5a5 !important; } h1, h2 { color: #ec4899 !important; }"

# =============================================================================
# Test Case 2 — Regions demo (override widths to 1280 only)
# =============================================================================

- scrollUntilVisible:
    element: "Your all-in-one visual review platform"
    direction: UP
- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "regions-ignore-by-box"
      WIDTHS: "1280"
      TEST_CASE: "regions-demo"
      LABELS: "regions,ignore,boundingBox"
      PERCY_CSS: "body { padding-top: 0 !important; } nav { background: #fbbf24 !important; } h1 { color: #ec4899 !important; background: #fef3c7 !important; }"
      REGIONS: '[{"algorithm":"ignore","elementSelector":{"boundingBox":{"x":0,"y":0,"width":1280,"height":80}},"padding":{"top":4,"right":4,"bottom":4,"left":4}}]'

- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "regions-layout-by-css"
      WIDTHS: "1280"
      TEST_CASE: "regions-demo"
      LABELS: "regions,layout,cssSelector"
      PERCY_CSS: "footer { background: #fca5a5 !important; padding: 40px !important; } h1 { color: #ec4899 !important; }"
      REGIONS: '[{"algorithm":"layout","elementSelector":{"elementCSS":"footer"}}]'

- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "regions-intelliignore-configured"
      WIDTHS: "1280"
      TEST_CASE: "regions-demo"
      LABELS: "regions,intelliignore,configured"
      PERCY_CSS: "h1, h2 { color: #ec4899 !important; background: #fef3c7 !important; padding: 16px !important; } [class*='carousel'], [class*='banner'] { outline: 3px solid #3b82f6 !important; }"
      REGIONS: '[{"algorithm":"intelliignore","elementSelector":{"boundingBox":{"x":0,"y":0,"width":1280,"height":600}},"configuration":{"diffSensitivity":1,"imageIgnoreThreshold":0.1,"carouselsEnabled":true,"bannersEnabled":true,"adsEnabled":true},"assertion":{"diffIgnoreThreshold":0.1}}]'

# =============================================================================
# Test Case 3 — Responsive + style customization
# =============================================================================

- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "responsive-dom-capture"
      WIDTHS: "375,768,1280"
      RESPONSIVE: "true"
      MIN_HEIGHT: "1200"
      TEST_CASE: "responsive-demo"
      LABELS: "responsive,viewport-emulation"
      PERCY_CSS: "h1 { color: #ec4899 !important; border: 3px dashed #3b82f6 !important; } img { filter: hue-rotate(30deg) !important; }"

- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "custom-percyCSS"
      WIDTHS: "1280"
      TEST_CASE: "responsive-demo"
      LABELS: "percyCSS,style-override"
      ENABLE_JS: "false"
      PERCY_CSS: "body { background: #dbeafe !important; } .cta, [class*='button'] { outline: 4px solid #ec4899 !important; transform: scale(1.05) !important; }"

# =============================================================================
# Test Case 4 — Scoped snapshot
# =============================================================================

- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "scoped-navbar-only"
      WIDTHS: "1280"
      TEST_CASE: "scoped-demo"
      LABELS: "scope,partial-dom"
      SCOPE: "nav"
      PERCY_CSS: "nav { background: linear-gradient(90deg, #fef3c7, #fbbf24) !important; outline: 2px solid #3b82f6 !important; }"
