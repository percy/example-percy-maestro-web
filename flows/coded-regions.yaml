# Coded regions demo — the REGIONS env var below is the exact JSON
# output of running `node scripts/build-regions.js` (which uses
# createRegion() programmatically). Keeps the YAML + helper in sync:
# if you change build-regions.js, regenerate and paste the output.

url: https://percy.io
---
- launchApp

- runScript:
    file: ../node_modules/@percy/maestro-web/scripts/snapshot.js
    env:
      NAME: "coded-regions-demo"
      TEST_CASE: "coded-regions"
      LABELS: "regions,createRegion,programmatic"
      PERCY_CSS: "nav { background: #22c55e !important; } footer { background: #3b82f6 !important; } h1 { color: #f97316 !important; }"
      # Produced by `node scripts/build-regions.js`. Per Percy's schema,
      # padding must be an object ({top, right, bottom, left}), not a
      # scalar — the helper handles this correctly.
      REGIONS: '[{"algorithm":"ignore","elementSelector":{"boundingBox":{"x":0,"y":0,"width":1280,"height":80}},"padding":{"top":4,"right":4,"bottom":4,"left":4}},{"algorithm":"layout","elementSelector":{"elementCSS":"footer"}},{"algorithm":"intelliignore","elementSelector":{"boundingBox":{"x":0,"y":600,"width":1280,"height":400}},"configuration":{"carouselsEnabled":true,"bannersEnabled":true,"adsEnabled":true}}]'
